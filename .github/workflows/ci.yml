name: Customer Churn CI

on:
  push:
    branches:
      - master
      - pipeline-refactor

  pull_request:
    branches:
      - master

jobs:
  test-and-build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: |
          pip install poetry

      - name: Install Dependencies
        run: |
          poetry install

      - name: Verify Training Imports
        run: |
          poetry run python -c "from src.train import train_model; print('OK')"

      - name: Run Prediction Test
        run: |
          poetry run python tests/test_predict.py

      - name: Build Docker Image
        run: |
          docker build -t churn-api .